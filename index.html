<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>software78</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #f9f9f9;
            color: #222;
        }

        .grid {
            display: grid;
            grid-template-columns: 3fr 1fr;
            min-height: 100vh;
        }

        /* ── Left column ── */
        .col-left {
            background: #fff;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            border-right: 1px solid #e0e0e0;
        }

        .col-left-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #888;
        }

        .company-name {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .motto {
            font-size: 1rem;
            font-style: italic;
            color: #555;
            margin-top: -0.5rem;
        }

        .social-links {
            display: flex;
            gap: 1rem;
        }

        .social-links a {
            color: #444;
            transition: color 0.2s;
        }

        .social-links a:hover {
            color: #000;
        }

        .social-links svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
            display: block;
        }

        /* ── Right column ── */
        .col-right {
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* Full-width cards stacked flush, no gaps */
        .apps-grid {
            display: flex;
            flex-direction: column;
        }

        .app-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
        }

        .app-poster {
            position: relative;
            aspect-ratio: 32 / 9;
        }

        .app-card:nth-child(1) .app-poster {
            background: linear-gradient(to bottom, #f5f9ff, #dbeafe);
        }

        .app-card:nth-child(2) .app-poster {
            background: linear-gradient(to bottom, #f8f6ff, #e9e3ff);
        }

        .app-card:nth-child(3) .app-poster {
            background: linear-gradient(to bottom, #f4fdf6, #d6f5df);
        }

        .app-card:nth-child(4) .app-poster {
            background: linear-gradient(to bottom, #fff9f0, #fde8c8);
        }

        .app-label {
            position: absolute;
            left: 0;
            bottom: 0;
            padding: 1rem 1.25rem;
        }

        .app-name {
            color: #1e293b;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* ── Desktop: center left column, cards fill full screen height ── */
        @media (min-width: 769px) {
            .col-left {
                padding-right: 1rem;
            }

            .col-left-content {
                justify-content: center;
                align-items: center;
            }

            .site-footer {
                text-align: center;
            }

            .apps-grid {
                flex: 1;
            }

            .app-card {
                flex: 1;
            }

            .app-poster {
                aspect-ratio: auto;
                flex: 1;
            }
        }

        .site-footer {
            font-size: 0.78rem;
            color: #aaa;
        }

        /* ── Mobile: single column ── */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                align-content: start;
            }

            .col-left-content {
                flex: none;
            }

            .col-left {
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                padding-bottom: 1.5rem;
            }

            .site-footer {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="grid">

        <!-- Left: identity & links -->
        <div class="col-left">
            <div class="col-left-content">
                <div class="logo-placeholder">Logo</div>
                <div class="company-name">software78</div>
                <div class="motto">"Software For Humans"</div>
                <div class="social-links">
                    <a href="https://www.instagram.com/hamill_painting_wallpapering/" target="_blank" rel="noopener" aria-label="Instagram">

                    </a>

            <footer class="site-footer">made by software78</footer>
        </div>

        <!-- Right: apps grid -->
        <div class="col-right">
            <div class="apps-grid">
                <a class="app-card" href="#">
                    <div class="app-poster">
                        <div class="app-label">
                            <span class="app-name">surge15</span>
                        </div>
                    </div>

                <a class="app-card" href="#">
                    <div class="app-poster">
                        <div class="app-label">
                            <span class="app-name">fund78 (coming soon)</span>
                        </div>
                    </div>

                <a class="app-card" href="https://www.hamillpainting.com">
                    <div class="app-poster">
                        <div class="app-label">
                            <span class="app-name">hpw</span>

            </div>
        </div>

    </div>
</body>
</html>
